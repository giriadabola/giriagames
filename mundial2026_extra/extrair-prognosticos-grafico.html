<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gráfico de Prognósticos em PNG · Mundial 2026</title>
  <style>
    :root {
      --bg: #07131f;
      --bg-soft: #0e2235;
      --panel: #10253b;
      --panel-2: #16314d;
      --border: rgba(255,255,255,.12);
      --text: #eef6ff;
      --muted: #9eb6cf;
      --accent: #4cc9f0;
      --accent-2: #77e27a;
      --danger: #ff6b6b;
      --warning: #ffd166;
      --shadow: 0 18px 48px rgba(0,0,0,.28);
      --radius: 24px;
      --radius-sm: 16px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(76, 201, 240, .18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(119, 226, 122, .16), transparent 25%),
        linear-gradient(180deg, #07131f 0%, #091827 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 28px;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      gap: 24px;
    }

    .controls {
      background: rgba(11, 25, 39, .88);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .controls-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 2vw, 2.2rem);
      line-height: 1.1;
    }

    .subtitle, .status-text {
      color: var(--muted);
      margin: 0;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn, select {
      border: 0;
      border-radius: 14px;
      font: inherit;
    }

    .btn {
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      color: #08111b;
      background: linear-gradient(135deg, #77e27a 0%, #4cc9f0 100%);
      transition: transform .15s ease, opacity .15s ease;
    }

    .btn.secondary {
      color: var(--text);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: .5;
    }

    .btn:hover:not(:disabled) { transform: translateY(-1px); }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      align-items: end;
    }

    .predictions-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 850px;
      margin: 0 auto;
      width: 100%;
    }

    .prediction-row {
      display: grid;
      grid-template-columns: 280px 100px 1fr;
      align-items: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 10px 16px;
      white-space: nowrap;
    }

    .prediction-player {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .prediction-player-name {
      font-size: 1.05rem;
      color: var(--text);
      white-space: nowrap;
    }

    .prediction-stats-badge {
      white-space: nowrap;
    }

    .prediction-score {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--accent-2);
      background: rgba(119, 226, 122, 0.12);
      padding: 6px 16px;
      border-radius: 12px;
      border: 1px solid rgba(119, 226, 122, 0.2);
      white-space: nowrap;
    }

    .segment-stats {
      font-size: 0.72rem;
      opacity: 0.85;
      margin-left: auto;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 600;
      color: var(--muted);
    }

    .field { display: grid; gap: 8px; }
    .field label {
      font-size: .95rem;
      color: #d8e6f5;
      font-weight: 700;
    }

    select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.12);
      outline: none;
    }

    select option {
      color: #111;
    }

    .capture-wrap {
      display: grid;
      gap: 14px;
      overflow-x: auto;
      width: 100%;
      padding-bottom: 10px;
    }

    .capture {
      background:
        radial-gradient(circle at top left, rgba(76, 201, 240, .18), transparent 24%),
        radial-gradient(circle at top right, rgba(119, 226, 122, .18), transparent 22%),
        linear-gradient(180deg, rgba(16, 37, 59, .98) 0%, rgba(9, 21, 34, 1) 100%);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      width: max-content; /* Ajusta-se dinamicamente ao conteúdo para nunca cortar a outra equipa ou barras */
      min-width: 1000px; /* Largura mínima razoável */
      flex-shrink: 0;
    }

    .capture::before,
    .capture::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(14px);
      opacity: .24;
      pointer-events: none;
    }

    .capture::before {
      width: 260px; height: 260px;
      background: #4cc9f0;
      top: -90px; left: -60px;
    }

    .capture::after {
      width: 240px; height: 240px;
      background: #77e27a;
      bottom: -80px; right: -60px;
    }

    .capture-inner {
      position: relative;
      z-index: 1;
      padding: 26px;
      display: grid;
      gap: 20px;
    }

    .top-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      padding: 6px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
      overflow: hidden;
      flex: 0 0 56px;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand h2 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.15;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: .93rem;
    }

    .stage-badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: .86rem;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.08);
      color: #f4fbff;
    }

    .badge.live { background: rgba(255, 209, 102, .18); color: #ffe29c; border-color: rgba(255,209,102,.25); }
    .badge.finished { background: rgba(119,226,122,.18); color: #b7f2b9; border-color: rgba(119,226,122,.25); }
    .badge.future { background: rgba(76, 201, 240, .14); color: #bfeeff; border-color: rgba(76,201,240,.22); }

    .scoreboard {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 20px;
      align-items: center;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 26px;
      padding: 20px;
    }

    .team-box {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .team-box.away {
      justify-content: flex-end;
      text-align: right;
    }

    .flag {
      width: 84px;
      height: 84px;
      min-width: 84px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255,255,255,.08);
      border: 3px solid rgba(255,255,255,.16);
      box-shadow: 0 8px 18px rgba(0,0,0,.22);
    }

    .team-name {
      font-size: clamp(1.3rem, 2vw, 2.1rem);
      font-weight: 900;
      line-height: 1.05;
      margin: 0;
      word-break: break-word;
    }

    .team-sub {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .score-center {
      text-align: center;
      min-width: 170px;
    }

    .score-main {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      padding: 16px 22px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.12) 0%, rgba(255,255,255,.06) 100%);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      font-size: clamp(1.7rem, 2.4vw, 2.6rem);
      font-weight: 900;
      letter-spacing: .04em;
    }

    .score-main .live-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #ffd166; margin-right: 12px;
      box-shadow: 0 0 0 6px rgba(255,209,102,.14);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      70% { transform: scale(1.15); opacity: .65; }
      100% { transform: scale(1); opacity: 1; }
    }

    .score-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.35;
    }

    .section {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: 1.25rem;
    }

    .section-subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .94rem;
    }

    .muted-card {
      border-radius: 18px;
      border: 1px dashed rgba(255,255,255,.14);
      padding: 16px;
      color: var(--muted);
      background: rgba(255,255,255,.03);
    }

    /* SEGMENTED BAR CHART STYLES */
    .chart-wrapper {
      display: flex;
      gap: 20px;
      padding: 20px 10px 10px 10px;
      position: relative;
      min-height: 380px;
      align-items: stretch;
    }

    .chart-y-axis {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      width: 45px;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      margin-bottom: 56px; /* align with bottom labels height */
      padding-right: 8px;
    }

    .chart-y-tick {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 48px; /* Must match .chart-segment height exactly */
      position: relative;
    }

    .chart-y-tick::after {
      content: "";
      position: absolute;
      right: -1px;
      width: 6px;
      height: 1px;
      background: rgba(255, 255, 255, 0.3);
    }

    .chart-bars-area {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      flex: 1;
      overflow-x: auto;
      padding-left: 10px;
    }

    .chart-bar-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 140px;
      max-width: 200px;
    }

    .chart-bar-total {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      background: rgba(76, 201, 240, 0.12);
      padding: 2px 8px;
      border-radius: 8px;
      border: 1px solid rgba(76, 201, 240, 0.2);
    }

    .chart-bar {
      display: flex;
      flex-direction: column-reverse;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      background: rgba(255, 255, 255, 0.02);
    }

    .chart-segment {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      height: 48px; /* Fixed height for pixel-perfect ticks */
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
    }

    .chart-segment:first-child {
      border-bottom: none;
    }

    .chart-segment .participant-icon {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      border-radius: 8px;
    }

    .chart-segment-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chart-bar-label {
      margin-top: 12px;
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      text-align: center;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .participant-icon {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      display: inline-grid;
      place-items: center;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,.08);
    }

    .participant-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .participant-ident {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 800;
    }

    .participant-ident__name {
      display: inline-block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 220px;
    }

    @media (max-width: 980px) {
      body { padding: 18px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="controls">
      <div class="controls-top">
        <div>
          <h1>Extrair Gráfico de Prognósticos em PNG</h1>
          <p class="subtitle">Escolhe um jogo do torneio para gerar um gráfico de barras segmentado por utilizador com os palpites mais frequentes.</p>
        </div>
        <div class="actions">
          <button id="refreshBtn" class="btn secondary" type="button">Recarregar dados</button>
          <button id="downloadBtn" class="btn" type="button" disabled>Download PNG</button>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="matchSelect">Jogo do torneio</label>
          <select id="matchSelect">
            <option value="">A carregar jogos...</option>
          </select>
        </div>
        <div class="field">
          <label for="layoutSelect">Visualização</label>
          <select id="layoutSelect">
            <option value="columns">Colunas</option>
            <option value="column">Coluna</option>
          </select>
        </div>
        <div class="field" style="display: flex; align-items: center; gap: 8px; height: 50px; flex-direction: row;">
          <input type="checkbox" id="showStatsToggle" style="width: 20px; height: 20px; cursor: pointer; margin: 0;">
          <label for="showStatsToggle" style="cursor: pointer; font-weight: 700; margin: 0; user-select: none;">Média do Resultado</label>
        </div>
        <div class="field" style="display: flex; align-items: center; gap: 8px; height: 50px; flex-direction: row;">
          <input type="checkbox" id="showSelectionStatsToggle" style="width: 20px; height: 20px; cursor: pointer; margin: 0;">
          <label for="showSelectionStatsToggle" style="cursor: pointer; font-weight: 700; margin: 0; user-select: none;">Média Vencedor/Empate</label>
        </div>
      </div>

      <p id="statusText" class="status-text" style="margin-top:14px;">A carregar dados do Mundial e do Firebase...</p>
    </section>

    <section class="capture-wrap">
      <div id="captureArea" class="capture" aria-live="polite">
        <div class="capture-inner">
          <div class="muted-card">Escolhe um jogo acima para gerar o resumo visual em gráfico.</div>
        </div>
      </div>
    </section>
  </main>

    };

    const CUSTOM_PLAYER_ICON_ALIASES = {
      leao: 'lion', 'leão': 'lion', agua: 'wave', 'água': 'wave', bufalo: 'buffalo', 'búfalo': 'buffalo',
      elefante: 'elephant', tigre: 'tiger', hiena: 'hyena', jiboia: 'boa', jibóia: 'boa',
      jacare: 'gator', jacaré: 'gator', hipopotamo: 'hippo', hipopótamo: 'hippo', aguia: 'eagle', 'águia': 'eagle',
      lobo: 'wolf', rinoceronte: 'rhino', cobra: 'cobra', tubarao: 'shark', tubarão: 'shark',
      falcao: 'falcon', falcão: 'falcon', pantera: 'panther', urso: 'bear', raposa: 'fox', coruja: 'owl', touro: 'bull'
    };

    const state = {
      matches: [],
      flagsByName: new Map(),
      flagUrlCache: new Map(),
      officialResults: {},
      predictions: [],
      selectedMatchId: '',
      selectedLayout: 'columns',
      showStats: false,
      showSelectionStats: false,
      firebaseReady: false
    };

    const matchSelect = document.querySelector('#matchSelect');
    const layoutSelect = document.querySelector('#layoutSelect');
    const showStatsToggle = document.querySelector('#showStatsToggle');
    const showSelectionStatsToggle = document.querySelector('#showSelectionStatsToggle');
    const statusText = document.querySelector('#statusText');
    const captureArea = document.querySelector('#captureArea');
    const downloadBtn = document.querySelector('#downloadBtn');
    const refreshBtn = document.querySelector('#refreshBtn');

    function outcome(home, away) {
      return Number(home) > Number(away) ? 'home' : Number(away) > Number(home) ? 'away' : 'draw';
    }

    function getPlayerScoreStats(player, currentMatchId, predHome, predAway) {
      let total = 0;
      let correct = 0;
      (player.matches || []).forEach(pred => {
        if (String(pred.id) === String(currentMatchId)) return;
        if (pred.homeGoals != null && pred.awayGoals != null && pred.homeGoals !== '' && pred.awayGoals !== '') {
          const ph = Number(pred.homeGoals);
          const pa = Number(pred.awayGoals);
          if (ph === Number(predHome) && pa === Number(predAway)) {
            const official = getOfficialResult(pred.id);
            if (official && resultHasScore(official) && isOfficialResultFinished(official)) {
              total++;
              if (Number(official.homeGoals) === ph && Number(official.awayGoals) === pa) {
                correct++;
              }
            }
          }
        }
      });
      return { total, correct };
    }

    function getPlayerSelectionStats(player, currentMatch, predHome, predAway) {
      const ph = Number(predHome);
      const pa = Number(predAway);
      const isHomeWin = ph > pa;
      const isAwayWin = ph < pa;
      const isDraw = ph === pa;
      
      const targetTeam = isHomeWin ? currentMatch.home : (isAwayWin ? currentMatch.away : null);
      
      let total = 0;
      let correct = 0;
      
      (player.matches || []).forEach(pred => {
        if (String(pred.id) === String(currentMatch.id)) return;
        if (pred.homeGoals != null && pred.awayGoals != null && pred.homeGoals !== '' && pred.awayGoals !== '') {
          const otherMatch = state.matches.find(m => String(m.id) === String(pred.id));
          if (!otherMatch) return;
          
          const oph = Number(pred.homeGoals);
          const opa = Number(pred.awayGoals);
          
          let matchesSelection = false;
          if (isDraw) {
            matchesSelection = (oph === opa);
          } else {
            const otherMatchHomeWinner = normalizeTeamName(otherMatch.home) === normalizeTeamName(targetTeam) && (oph > opa);
            const otherMatchAwayWinner = normalizeTeamName(otherMatch.away) === normalizeTeamName(targetTeam) && (opa > oph);
            matchesSelection = otherMatchHomeWinner || otherMatchAwayWinner;
          }
          
          if (matchesSelection) {
            const official = getOfficialResult(pred.id);
            if (official && resultHasScore(official) && isOfficialResultFinished(official)) {
              total++;
              const oh = Number(official.homeGoals);
              const oa = Number(official.awayGoals);
              
              if (isDraw) {
                if (oh === oa) correct++;
              } else {
                const homeWon = normalizeTeamName(otherMatch.home) === normalizeTeamName(targetTeam) && (oh > oa);
                const awayWon = normalizeTeamName(otherMatch.away) === normalizeTeamName(targetTeam) && (oa > oh);
                if (homeWon || awayWon) correct++;
              }
            }
          }
        }
      });
      
      return { 
        total, 
        correct, 
        label: isDraw ? 'no Empate' : `em ${targetTeam}`
      };
    }

    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[char]));
    }

    function slugify(text) {
      return String(text || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function normalizeTeamName(name) {
      return String(name || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function participantIconKey(source) {
      const raw = typeof source === 'string'
        ? source
        : (source?.icon || source?.participantIcon || source?.playerIcon || source?.animalIcon || '');
      const normalized = String(raw || '').trim().toLowerCase().replace(/^fa-/, '').replace(/\s+/g, '-').replace(/_/g, '-');
      return CUSTOM_PLAYER_ICON_ALIASES[normalized] || normalized;
    }

    function participantIconMeta(source) {
      const key = participantIconKey(source);
      return CUSTOM_PLAYER_ICONS[key] || null;
    }

    function renderParticipantIcon(iconSource) {
      const meta = participantIconMeta(iconSource);
      if (!meta) return '<span class="participant-icon" aria-hidden="true">👤</span>';
      const key = participantIconKey(iconSource);
      return `<span class="participant-icon" title="${escapeHtml(meta.label)}" aria-hidden="true"><svg viewBox="0 0 84 84" role="img" focusable="false"><defs><linearGradient id="grad-${escapeHtml(key)}" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="${meta.bg1}"/><stop offset="100%" stop-color="${meta.bg2}"/></linearGradient></defs><rect x="4" y="4" width="76" height="76" rx="24" fill="url(#grad-${escapeHtml(key)})"/><circle cx="42" cy="42" r="31" fill="rgba(255,255,255,.08)"/><g fill="none" stroke="#f8fbff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">${meta.glyph}</g></svg></span>`;
    }

    function renderParticipantIdentity(name, iconSource) {
      return `<span class="participant-ident">${renderParticipantIcon(iconSource)}<span class="participant-ident__name">${escapeHtml(name || 'Participante')}</span></span>`;
    }

    function formatDate(dateStr, timeStr) {
      if (!dateStr) return 'Data por definir';
      const date = new Date(`${dateStr}T${timeStr || '12:00'}:00`);
      return new Intl.DateTimeFormat('pt-PT', {
        weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      }).format(date);
    }

    function resultHasScore(result) {
      return !!result && result.homeGoals != null && result.homeGoals !== '' && result.awayGoals != null && result.awayGoals !== '';
    }

    function isOfficialResultLive(result) {
      if (!result) return false;
      if (result.finished === true || result._finished === true || result.status === 'finished') return false;
      return !!(result.live === true || result._live === true || result.status === 'live');
    }

    function isOfficialResultFinished(result) {
      if (!result) return false;
      if (result.finished === true || result._finished === true || result.status === 'finished') return true;
      return !!(resultHasScore(result) && !isOfficialResultLive(result) && (result.status === 'official' || result.type === 'officialResult' || result.status === 'finished'));
    }

    function shouldTrackMatchDocAsOfficial(doc) {
      if (!doc) return false;
      const isLive = isOfficialResultLive(doc);
      const hasG = isLive 
        ? (doc.homeGoalsLive != null && doc.homeGoalsLive !== '') 
        : (doc.homeGoals != null && doc.homeGoals !== '');
      const hasAwayG = isLive 
        ? (doc.awayGoalsLive != null && doc.awayGoalsLive !== '') 
        : (doc.awayGoals != null && doc.awayGoals !== '');
      return (isLive || isOfficialResultFinished(doc) || resultHasScore(doc)) && hasG && hasAwayG;
    }

    function normalizeMatchStateDoc(docId, raw = {}) {
      const matchId = Number(raw.matchId ?? String(docId || '').replace(/^match_/, ''));
      const isLive = !!(raw.live === true || raw.status === 'live');
      return {
        id: docId,
        ...raw,
        matchId: Number.isFinite(matchId) ? matchId : null,
        documentId: raw.documentId || raw.matchDocId || docId,
        homeGoals: isLive ? (raw.homeGoalsLive ?? raw.homeGoals ?? null) : (raw.homeGoals ?? null),
        awayGoals: isLive ? (raw.awayGoalsLive ?? raw.awayGoals ?? null) : (raw.awayGoals ?? null)
      };
    }

    async function dataUrlFromSvgUrl(url) {
      if (!url) return '';
      if (state.flagUrlCache.has(url)) return state.flagUrlCache.get(url);
      try {
        const response = await fetch(url, { mode: 'cors' });
        const text = await response.text();
        const encoded = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(text)}`;
        state.flagUrlCache.set(url, encoded);
        return encoded;
      } catch (error) {
        console.warn('Falha ao converter bandeira para data URL:', url, error);
        state.flagUrlCache.set(url, url);
        return url;
      }
    }

    async function getFlagSrc(teamName) {
      const key = normalizeTeamName(teamName);
      const item = state.flagsByName.get(key);
      if (!item?.flagRound) return '';
      return dataUrlFromSvgUrl(item.flagRound);
    }

    async function loadFlags() {
      const response = await fetch('./mundial2026_bandeiras_redondas.json');
      if (!response.ok) throw new Error('Não foi possível carregar o ficheiro das bandeiras.');
      const payload = await response.json();
      const items = Array.isArray(payload)
        ? payload
        : (Array.isArray(payload?.teams) ? payload.teams : []);

      state.flagsByName = new Map();

      items.forEach(item => {
        if (item?.nome) state.flagsByName.set(normalizeTeamName(item.nome), item);
        if (item?.name) state.flagsByName.set(normalizeTeamName(item.name), item);
        if (item?.nameEn) state.flagsByName.set(normalizeTeamName(item.nameEn), item);
        if (item?.id) state.flagsByName.set(normalizeTeamName(item.id), item);
        (item?.aliases || []).forEach(alias => {
          state.flagsByName.set(normalizeTeamName(alias), item);
        });
      });
    }

    async function loadMatches() {
      const response = await fetch('./matches.json');
      if (!response.ok) throw new Error('Não foi possível carregar os jogos.');
      const payload = await response.json();
      state.matches = Array.isArray(payload?.matches) ? payload.matches : [];
    }

    async function initFirebase() {
      const appModule = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js');
      const firestoreModule = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js');
      const app = appModule.initializeApp(FIREBASE_CONFIG);
      const db = firestoreModule.getFirestore(app);
      state.firebase = {
        db,
        ...firestoreModule
      };
      state.firebaseReady = true;
    }

    async function loadOfficialMatchStateDocs() {
      if (!state.firebaseReady) return { allDocs: [], officialByMatchId: {} };
      const { db, collection, query, orderBy, getDocs } = state.firebase;
      const collectionRef = collection(db, FIREBASE_COLLECTION);
      const matchesCollectionRef = collection(db, FIREBASE_MATCHES_COLLECTION);
      let legacySnapshot;
      let matchesSnapshot = null;

      try {
        legacySnapshot = await getDocs(query(collectionRef, orderBy('clientTimestamp', 'desc')));
      } catch {
        legacySnapshot = await getDocs(collectionRef);
      }
      try {
        matchesSnapshot = await getDocs(matchesCollectionRef);
      } catch (error) {
        console.warn('Não foi possível carregar worldcupextraMatches. A usar fallback legacy.', error);
      }

      const allDocs = legacySnapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
      const legacyOfficialDocs = allDocs
        .filter(doc => doc.status === 'official' || doc.type === 'officialResult' || doc.status === 'finished')
        .filter(doc => doc.matchId != null || doc.id?.startsWith?.('official-match-'))
        .map(doc => [String(doc.matchId ?? String(doc.id).replace('official-match-', '')), doc]);

      const matchStateDocs = (matchesSnapshot?.docs || [])
        .map(docSnap => normalizeMatchStateDoc(docSnap.id, docSnap.data()))
        .filter(shouldTrackMatchDocAsOfficial)
        .map(doc => [String(doc.matchId), doc]);

      return {
        allDocs,
        officialByMatchId: Object.fromEntries([...legacyOfficialDocs, ...matchStateDocs])
      };
    }

    async function loadPredictionsAndResults() {
      const loaded = await loadOfficialMatchStateDocs();
      state.officialResults = loaded.officialByMatchId;
      state.predictions = loaded.allDocs
        .filter(doc => doc.status !== 'official' && doc.type !== 'officialResult' && Array.isArray(doc.matches))
        .map(doc => ({
          id: doc.id,
          participantName: doc.participantName || doc.name || 'Participante',
          icon: doc.icon || doc.participantIcon || doc.playerIcon || '',
          matches: Array.isArray(doc.matches) ? doc.matches : []
        }));
    }

    function getOfficialResult(matchId) {
      return state.officialResults[String(matchId)] || null;
    }

    function getPredictionForMatch(player, matchId) {
      return (player.matches || []).find(item => String(item.id) === String(matchId)) || null;
    }

    function populateMatchSelect() {
      const options = ['<option value="">Escolhe um jogo...</option>'];
      state.matches.forEach(match => {
        const stageLabel = STAGE_LABELS[match.stage] || match.stage || 'Jogo';
        const groupLabel = match.group ? ` · Grupo ${escapeHtml(match.group)}` : '';
        const label = `Jogo ${match.id} · ${match.home} vs ${match.away} · ${stageLabel}${groupLabel}`;
        options.push(`<option value="${match.id}">${escapeHtml(label)}</option>`);
      });
      matchSelect.innerHTML = options.join('');
      if (state.selectedMatchId) matchSelect.value = state.selectedMatchId;
    }

    function matchStatusInfo(official) {
      if (!official || !resultHasScore(official)) {
        return { key: 'future', label: 'Por jogar', badgeClass: 'future' };
      }
      if (isOfficialResultLive(official)) {
        return { key: 'live', label: 'Ao vivo', badgeClass: 'live' };
      }
      return { key: 'finished', label: 'Terminado', badgeClass: 'finished' };
    }

    async function renderSelectedMatch() {
      const matchId = state.selectedMatchId;
      if (!matchId) {
        captureArea.innerHTML = '<div class="capture-inner"><div class="muted-card">Escolhe um jogo acima para gerar o resumo visual em gráfico.</div></div>';
        downloadBtn.disabled = true;
        return;
      }

      const match = state.matches.find(item => String(item.id) === String(matchId));
      if (!match) {
        captureArea.innerHTML = '<div class="capture-inner"><div class="muted-card">Esse jogo não foi encontrado.</div></div>';
        downloadBtn.disabled = true;
        return;
      }

      const official = getOfficialResult(match.id);
      const status = matchStatusInfo(official);
      const homeFlag = await getFlagSrc(match.home);
      const awayFlag = await getFlagSrc(match.away);
      const scoreText = resultHasScore(official)
        ? `${Number(official.homeGoals)} - ${Number(official.awayGoals)}`
        : 'VS';
      const competitionBadge = match.group ? `Grupo ${match.group}` : (STAGE_LABELS[match.stage] || 'Eliminatória');

      // Agrupar palpites por resultado
      const resultGroups = {}; // key: "homeGoals-awayGoals", value: array de players
      let totalPicksCount = 0;
      const allPlayerPicks = [];

      state.predictions.forEach(player => {
        const pred = getPredictionForMatch(player, match.id);
        if (pred && pred.homeGoals != null && pred.awayGoals != null && pred.homeGoals !== '' && pred.awayGoals !== '') {
          const key = `${Number(pred.homeGoals)} - ${Number(pred.awayGoals)}`;
          
          let statsText = '';
          if (state.showStats) {
            const stats = getPlayerScoreStats(player, match.id, pred.homeGoals, pred.awayGoals);
            const pct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : null;
            statsText = pct !== null ? `${pct}% (${stats.correct}/${stats.total})` : `-% (0/0)`;
          }

          let selStatsText = '';
          let selLabel = '';
          let selLabelShort = '';
          if (state.showSelectionStats) {
            const stats = getPlayerSelectionStats(player, match, pred.homeGoals, pred.awayGoals);
            const pct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : null;
            selStatsText = pct !== null ? `${pct}% (${stats.correct}/${stats.total})` : `-% (0/0)`;
            selLabel = stats.label;
            selLabelShort = (pred.homeGoals === pred.awayGoals) ? 'Emp' : 'Sel';
          }

          if (!resultGroups[key]) {
            resultGroups[key] = [];
          }
          resultGroups[key].push({
            name: player.participantName,
            icon: player.icon,
            statsText: statsText,
            selStatsText: selStatsText,
            selLabel: selLabel,
            selLabelShort: selLabelShort
          });
          allPlayerPicks.push({
            name: player.participantName,
            icon: player.icon,
            score: key,
            statsText: statsText,
            selStatsText: selStatsText,
            selLabel: selLabel,
            selLabelShort: selLabelShort
          });
          totalPicksCount++;
        }
      });

      // Ordenar os grupos por frequência decrescente
      const sortedResults = Object.keys(resultGroups).map(key => {
        return {
          score: key,
          players: resultGroups[key].sort((a, b) => a.name.localeCompare(b.name, 'pt-PT'))
        };
      }).sort((a, b) => b.players.length - a.players.length || a.score.localeCompare(b.score));

      // Ordenar palpites individuais por nome de jogador
      allPlayerPicks.sort((a, b) => a.name.localeCompare(b.name, 'pt-PT'));

      // Construção do Gráfico
      let chartHtml = '';
      if (totalPicksCount > 0) {
        if (state.selectedLayout === 'column') {
          // Lista de palpites numa única coluna
          const listRowsHtml = allPlayerPicks.map(p => {
            let statsHtml = '';
            if (state.showStats && state.showSelectionStats) {
              statsHtml = `
                <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 4px;">
                  <span class="prediction-stats-badge" style="font-size: 0.8rem; background: rgba(255,255,255,0.06); padding: 4px 8px; border-radius: 8px; color: var(--muted); border: 1px solid rgba(255,255,255,0.08); font-weight: 600;">Acerto no Resultado: ${escapeHtml(p.statsText)}</span>
                  <span class="prediction-stats-badge" style="font-size: 0.8rem; background: rgba(255,255,255,0.06); padding: 4px 8px; border-radius: 8px; color: var(--muted); border: 1px solid rgba(255,255,255,0.08); font-weight: 600;">Acerto ${escapeHtml(p.selLabel)}: ${escapeHtml(p.selStatsText)}</span>
                </div>
              `;
            } else if (state.showStats) {
              statsHtml = `
                <span class="prediction-stats-badge" style="font-size: 0.8rem; background: rgba(255,255,255,0.06); padding: 4px 8px; border-radius: 8px; color: var(--muted); border: 1px solid rgba(255,255,255,0.08); font-weight: 600; width: fit-content;">Acerto no Resultado: ${escapeHtml(p.statsText)}</span>
              `;
            } else if (state.showSelectionStats) {
              statsHtml = `
                <span class="prediction-stats-badge" style="font-size: 0.8rem; background: rgba(255,255,255,0.06); padding: 4px 8px; border-radius: 8px; color: var(--muted); border: 1px solid rgba(255,255,255,0.08); font-weight: 600; width: fit-content;">Acerto ${escapeHtml(p.selLabel)}: ${escapeHtml(p.selStatsText)}</span>
              `;
            }

            return `
              <div class="prediction-row">
                <div class="prediction-player">
                  ${renderParticipantIcon(p.icon)}
                  <span class="prediction-player-name">${escapeHtml(p.name)}</span>
                </div>
                <span class="prediction-score" style="justify-self: start;">${escapeHtml(p.score)}</span>
                ${statsHtml}
              </div>
            `;
          }).join('');

          chartHtml = `
            <div class="predictions-list">
              ${listRowsHtml}
            </div>
          `;
        } else {
          // Colunas (original)
          const maxPicks = Math.max(...sortedResults.map(r => r.players.length));
          
          // Eixo Y
          let yTicksHtml = '';
          for (let i = maxPicks; i >= 1; i--) {
            yTicksHtml += `<div class="chart-y-tick"><span>${i}</span></div>`;
          }

          // Barras
          const barsHtml = sortedResults.map(res => {
            const segmentsHtml = res.players.map(p => {
              let segmentInnerStats = '';
              let segmentTitle = escapeHtml(p.name);
              
              if (state.showStats && state.showSelectionStats) {
                segmentTitle += ` (Resultado: ${escapeHtml(p.statsText)} | Acerto ${escapeHtml(p.selLabel)}: ${escapeHtml(p.selStatsText)})`;
                segmentInnerStats = `
                  <div style="display: flex; flex-direction: column; align-items: flex-end; margin-left: auto; gap: 2px; line-height: 1;">
                    <span class="segment-stats" style="font-size: 0.65rem; padding: 1px 3px;">R: ${escapeHtml(p.statsText.split(' ')[0])}</span>
                    <span class="segment-stats" style="font-size: 0.65rem; padding: 1px 3px;">${escapeHtml(p.selLabelShort)}: ${escapeHtml(p.selStatsText.split(' ')[0])}</span>
                  </div>
                `;
              } else if (state.showStats) {
                segmentTitle += ` (${escapeHtml(p.statsText)})`;
                segmentInnerStats = `<span class="segment-stats">${escapeHtml(p.statsText)}</span>`;
              } else if (state.showSelectionStats) {
                segmentTitle += ` (Acerto ${escapeHtml(p.selLabel)}: ${escapeHtml(p.selStatsText)})`;
                segmentInnerStats = `<span class="segment-stats">${escapeHtml(p.selLabelShort)}: ${escapeHtml(p.selStatsText)}</span>`;
              }

              return `
                <div class="chart-segment" title="${segmentTitle}">
                  ${renderParticipantIcon(p.icon)}
                  <span class="chart-segment-name">${escapeHtml(p.name)}</span>
                  ${segmentInnerStats}
                </div>
              `;
            }).join('');

            return `
              <div class="chart-bar-container">
                <span class="chart-bar-total">${res.players.length} ${res.players.length === 1 ? 'palpite' : 'palpites'}</span>
                <div class="chart-bar">
                  ${segmentsHtml}
                </div>
                <span class="chart-bar-label">${escapeHtml(res.score)}</span>
              </div>
            `;
          }).join('');

          chartHtml = `
            <div class="chart-wrapper">
              <div class="chart-y-axis">
                ${yTicksHtml}
              </div>
              <div class="chart-bars-area">
                ${barsHtml}
              </div>
            </div>
          `;
        }
      } else {
        chartHtml = '<div class="muted-card">Ainda não existem prognósticos gravados para este jogo.</div>';
      }

      captureArea.innerHTML = `
        <div class="capture-inner">
          <div class="top-strip">
            <div class="brand">
              <div class="brand-mark"><img src="./favicon-source.png" alt="GGames Mundial 2026"></div>
              <div>
                <h2>Mundial 2026 · Gráfico de Prognósticos</h2>
                <p>Giria Games - onde a normalidade é suspeita...</p>
              </div>
            </div>
            <div class="stage-badges">
              <span class="badge">${escapeHtml(STAGE_LABELS[match.stage] || 'Jogo')}</span>
              <span class="badge">${escapeHtml(competitionBadge)}</span>
              <span class="badge ${status.badgeClass}">${escapeHtml(status.label)}</span>
            </div>
          </div>

          <section class="scoreboard">
            <div class="team-box home">
              ${homeFlag ? `<img class="flag" src="${homeFlag}" alt="Bandeira ${escapeHtml(match.home)}" crossorigin="anonymous">` : ''}
              <div>
                <h3 class="team-name">${escapeHtml(match.home)}</h3>
                <p class="team-sub">${escapeHtml(match.country || '')}</p>
              </div>
            </div>

            <div class="score-center">
              <div class="score-main">${status.key === 'live' ? '<span class="live-dot" aria-hidden="true"></span>' : ''}${escapeHtml(scoreText)}</div>
              <div class="score-note">${escapeHtml(formatDate(match.date, match.time))}${match.venue ? ` · ${escapeHtml(match.venue)}` : ''}${match.city ? ` · ${escapeHtml(match.city)}` : ''}</div>
            </div>

            <div class="team-box away">
              <div>
                <h3 class="team-name">${escapeHtml(match.away)}</h3>
                <p class="team-sub">${escapeHtml(match.country || '')}</p>
              </div>
              ${awayFlag ? `<img class="flag" src="${awayFlag}" alt="Bandeira ${escapeHtml(match.away)}" crossorigin="anonymous">` : ''}
            </div>
          </section>

          <section class="section">
            <div class="section-header">
              <div>
                <h3 class="section-title">Pré-Match</h3>
                <p class="section-subtitle">${totalPicksCount} prognóstico(s) registado(s) para este encontro.</p>
              </div>
            </div>
            ${chartHtml}
          </section>
        </div>
      `;

      downloadBtn.disabled = false;
    }

    async function downloadPng() {
      if (!state.selectedMatchId) return;
      downloadBtn.disabled = true;
      const originalText = downloadBtn.textContent;
      downloadBtn.textContent = 'A gerar PNG...';
      try {
        const canvas = await window.html2canvas(captureArea, {
          backgroundColor: null,
          useCORS: true,
          allowTaint: false,
          scale: 2,
          logging: false
        });
        const match = state.matches.find(item => String(item.id) === String(state.selectedMatchId));
        const fileName = `mundial2026-grafico-${slugify(match?.home || 'jogo')}-vs-${slugify(match?.away || 'jogo')}.png`;
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = fileName;
        link.click();
      } catch (error) {
        console.error(error);
        alert('Não foi possível gerar o PNG. Confirma se as bandeiras carregaram e tenta novamente.');
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = originalText;
      }
    }

    async function reloadAll() {
      statusText.textContent = 'A carregar dados do Mundial e do Firebase...';
      downloadBtn.disabled = true;
      try {
        await loadMatches();
        await loadFlags();
        if (!state.firebaseReady) await initFirebase();
        await loadPredictionsAndResults();
        populateMatchSelect();
        statusText.textContent = `Jogos carregados: ${state.matches.length} · Prognósticos carregados: ${state.predictions.length}`;
        await renderSelectedMatch();
      } catch (error) {
        console.error(error);
        statusText.textContent = 'Erro ao carregar dados. Serve esta página num servidor web (ex.: Live Server) e confirma o acesso ao Firebase.';
        captureArea.innerHTML = '<div class="capture-inner"><div class="muted-card">Não foi possível carregar os dados desta página. Verifica a consola e confirma que estás a abrir a página num servidor web.</div></div>';
      }
    }

    matchSelect.addEventListener('change', async event => {
      state.selectedMatchId = event.target.value;
      await renderSelectedMatch();
    });

    layoutSelect.addEventListener('change', async event => {
      state.selectedLayout = event.target.value;
      await renderSelectedMatch();
    });

    showStatsToggle.addEventListener('change', async event => {
      state.showStats = event.target.checked;
      await renderSelectedMatch();
    });

    showSelectionStatsToggle.addEventListener('change', async event => {
      state.showSelectionStats = event.target.checked;
      await renderSelectedMatch();
    });

    refreshBtn.addEventListener('click', reloadAll);
    downloadBtn.addEventListener('click', downloadPng);

    reloadAll();
  </script>
</body>
</html>
