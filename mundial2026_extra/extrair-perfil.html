<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extrair Perfil · Mundial 2026</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="stylesheet" href="extrair-perfil.css">
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>Extrair perfil</h1>
        <p>Escolhe um jogador ou o total e monta um retrato dos prognósticos em PNG.</p>
      </div>
      <div class="actions">
        <button class="btn secondary" id="refreshBtn" type="button">Atualizar dados</button>
        <button class="btn" id="downloadBtn" type="button" disabled>Download PNG</button>
      </div>
    </header>

    <section class="panel controls" aria-label="Controlos do perfil">
      <div class="field">
        <label for="scopeSelect">Perfil</label>
        <select id="scopeSelect">
          <option value="total">Total</option>
        </select>
        <label class="total-player-toggle" id="totalByPlayerWrap">
          <input type="checkbox" id="totalByPlayerToggle">
          Mostrar gráfico por jogador
        </label>
        <button class="vs-toggle" id="vsToggle" type="button" aria-pressed="false">VS</button>
        <div class="vs-picker" id="vsPicker" hidden>
          <label>
            Jogador A
            <select id="vsLeftSelect"></select>
          </label>
          <span>vs</span>
          <label>
            Jogador B
            <select id="vsRightSelect"></select>
          </label>
        </div>
        <div class="selections-picker" id="selectionsPicker" style="margin-top: 12px;" hidden>
          <label>
            Seleção
            <select id="selectionSelect">
              <option value="all">Todas</option>
            </select>
          </label>
        </div>
        <div class="stadiums-picker" id="stadiumsPicker" style="margin-top: 12px;" hidden>
          <label>
            Estádio
            <select id="stadiumSelect">
              <option value="all">Todos</option>
            </select>
          </label>
        </div>
      </div>

      <div class="filter-grid" id="filterGrid">
        <label><input type="checkbox" value="lost"> Perdidos</label>
        <label><input type="checkbox" value="dramaticLost"> Dramaticamente perdidos</label>
        <label><input type="checkbox" value="commonResult"> Resultado comum</label>
        <label><input type="checkbox" value="checkpoint"> Intervalo/90</label>
        <label><input type="checkbox" value="badScorers"> Marcador Azia</label>
        <label><input type="checkbox" value="goodScorers"> Marcador Querido</label>
        <label><input type="checkbox" value="lateGains"> Ganhos por uma unha</label>
        <label><input type="checkbox" value="gains"> Ganhos</label>
        <label><input type="checkbox" value="aloneInFame"> Sozinho na Fama</label>
        <label><input type="checkbox" value="wonWithStyle"> Ganho com estilo</label>
        <label><input type="checkbox" value="selections"> Seleções</label>
        <label><input type="checkbox" value="stadiums"> Estádios</label>
      </div>
    </section>

    <p id="statusText" class="status">A carregar dados...</p>

    <section class="panel capture-wrap">
      <div id="captureArea" class="capture-area">
        <div class="empty">Escolhe uma ou mais opções para gerar o perfil.</div>
      </div>
    </section>
  </main>

  <script type="module" src="extrair-perfil.js"></script>
</body>
</html>
