<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extrair Perfil · Mundial 2026</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="stylesheet" href="extrair-perfil.css">
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <main class="page">
      <header class="topbar">
        <div>
          <h1>Extrair perfil</h1>
          <p>Escolhe um jogador ou o total e monta um retrato dos prognósticos em PNG.</p>
        </div>
        <div class="actions">
          <button class="btn secondary" id="refreshBtn" type="button">Atualizar dados</button>
          <button class="btn" id="downloadBtn" type="button" disabled>Download PNG</button>
        </div>
      </header>

      <section class="panel controls" aria-label="Controlos do perfil">
        <div class="field">
          <label for="scopeSelect">Perfil</label>
          <select id="scopeSelect">
            <option value="total">Total</option>
          </select>
          <label class="total-player-toggle" id="totalByPlayerWrap">
            <input type="checkbox" id="totalByPlayerToggle">
            Mostrar gráfico por jogador
          </label>
          <label class="total-player-toggle" id="bwToggleWrap" hidden>
            <input type="checkbox" id="bwProfileToggle" checked>
            Incluir bónus BW
          </label>
          <label class="total-player-toggle" id="ppToggleWrap" hidden>
            <input type="checkbox" id="ppProfileToggle" checked>
            Incluir bónus PP
          </label>
          <button class="vs-toggle" id="vsToggle" type="button" aria-pressed="false">VS</button>
          <div class="vs-picker" id="vsPicker" hidden>
            <label>
              Jogador A
              <select id="vsLeftSelect"></select>
            </label>
            <span>vs</span>
            <label>
              Jogador B
              <select id="vsRightSelect"></select>
            </label>
          </div>
          <div class="selections-picker" id="selectionsPicker" style="margin-top: 12px;" hidden>
            <label>
              Seleção
              <select id="selectionSelect">
                <option value="all">Todas</option>
              </select>
            </label>
          </div>
          <div class="stadiums-picker" id="stadiumsPicker" style="margin-top: 12px;" hidden>
            <label>
              Estádio
              <select id="stadiumSelect">
                <option value="all">Todos</option>
              </select>
            </label>
          </div>
          <div class="matches-picker" id="matchesPicker" style="margin-top: 12px;" hidden>
            <label>
              Jogo
              <select id="matchSelect">
              </select>
            </label>
          </div>
          <div class="leaderboard-compare-picker" id="leaderboardComparePicker" style="margin-top: 12px;" hidden>
            <label>
              Comparar posição com:
              <select id="leaderboardCompareSelect">
                <option value="none">Não comparar</option>
                <option value="1">1 jogo atrás</option>
                <option value="2">2 jogos atrás</option>
                <option value="3">3 jogos atrás</option>
                <option value="4">4 jogos atrás</option>
                <option value="5">5 jogos atrás</option>
              </select>
            </label>
          </div>
        </div>

        <div class="filter-grid" id="filterGrid">
          <label><input type="checkbox" value="lost"> Perdidos</label>
          <label><input type="checkbox" value="dramaticLost"> Dramaticamente perdidos</label>
          <label><input type="checkbox" value="commonResult"> Resultado comum</label>
          <label><input type="checkbox" value="checkpoint"> Intervalo/90</label>
          <label><input type="checkbox" value="badScorers"> Marcador Azia</label>
          <label><input type="checkbox" value="goodScorers"> Marcador Querido</label>
          <label><input type="checkbox" value="lateGains"> Ganhos por uma unha</label>
          <label><input type="checkbox" value="gains"> Ganhos</label>
          <label><input type="checkbox" value="aloneInFame"> Sozinho na Fama</label>
          <label><input type="checkbox" value="wonWithStyle"> Ganho com estilo</label>
          <label><input type="checkbox" value="selections"> Seleções</label>
          <label><input type="checkbox" value="stadiums"> Estádios</label>
          <label><input type="checkbox" value="starsPath"> Rumo ao Estrelato</label>
          <label><input type="checkbox" value="leaderboard"> Tabela Classificativa</label>
          <label><input type="checkbox" value="sequence"> Sequência</label>
          <label><input type="checkbox" value="prediction"> Prognóstico</label>
        </div>
      </section>

      <p id="statusText" class="status">A carregar dados...</p>

      <section class="panel capture-wrap">
        <div id="captureArea" class="capture-area">
          <div class="empty">Escolhe uma ou mais opções para gerar o perfil.</div>
        </div>
      </section>
    </main>

    <aside class="predictions-panel" id="predictionsPanel" hidden>
      <div class="panel-header">
        <h3 class="panel-title">Prognósticos: <span id="panelPlayerName">...</span></h3>
        <div class="panel-actions">
          <button id="minimizePanelBtn" class="panel-action-btn" title="Minimizar/Expandir" type="button">
            <svg class="icon-minimize" viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M19 13H5v-2h14v2z"/>
            </svg>
            <svg class="icon-expand" viewBox="0 0 24 24" width="16" height="16" style="display: none;">
              <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
          </button>
          <button id="closePanelBtn" class="panel-action-btn" title="Fechar" type="button">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="panel-content" id="panelContent">
        <!-- List will be rendered here -->
      </div>
    </aside>
  </div>

  <script type="module" src="extrair-perfil.js?v=20260629perfil4"></script>
</body>
</html>
