<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorldCup Sofa</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <meta name="theme-color" content="#10261f">
  <link rel="stylesheet" href="worldcup-sofa.css?v=20260619sofa1">
  <script defer src="worldcup-sofa-config.js?v=20260619sofa1"></script>
  <script defer src="worldcup-sofa.js?v=20260628sofa5"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Area reservada</p>
      <h1>WorldCup Sofa</h1>
      <p>Resultados e marcadores gravados apenas na colecao worldcupSofa.</p>
    </div>
    <nav class="top-actions" aria-label="Acoes">
      <a href="index.html">Site</a>
      <button id="logoutBtn" type="button" hidden>Sair</button>
    </nav>
  </header>

  <main class="shell">
    <section id="loginArea" class="panel">
      <h2>Entrar</h2>
      <div class="login-grid">
        <label>Email<input id="adminEmail" type="email" autocomplete="email"></label>
        <label>Password<input id="adminPassword" type="password" autocomplete="current-password"></label>
      </div>
      <button id="loginBtn" type="button" class="primary">Entrar</button>
      <p id="authStatus" class="message">A preparar ligacao...</p>
    </section>

    <section id="appArea" hidden>
      <div class="toolbar">
        <label>Fase
          <select id="stageFilter"></select>
        </label>
        <label>Grupo
          <select id="groupFilter"></select>
        </label>
        <label>Pesquisar
          <input id="searchInput" type="search" placeholder="equipa, estadio, jogo">
        </label>
      </div>

      <section id="matchesList" class="matches" aria-live="polite"></section>
    </section>
  </main>
</body>
</html>
